right_format = """$cmd_duration"""
continuation_prompt = "[´æä ]($style)"
command_timeout = 5000
follow_symlinks = true

# Disable the blank line at the start of the prompt
add_newline = true

### Left Side
[username]
show_always = true
style_user = "bg:#252526"
style_root = "bg:#252526"
format = "[$user ]($style)"

[directory]
style = "bg:#2D2D30"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

